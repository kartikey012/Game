
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent}
#wrap{display:flex;flex-direction:column;align-items:center;padding:1.5rem 0;gap:12px;font-family:var(--font-sans)}
#hud{display:flex;gap:2rem;width:640px;justify-content:center}
.stat{text-align:center}
.slabel{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.07em}
.sval{font-size:20px;font-weight:500;color:var(--color-text-primary)}
#cv{display:block;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);cursor:pointer;touch-action:none}
#hint{font-size:13px;color:var(--color-text-secondary)}
#lives{display:flex;gap:6px;align-items:center}
.heart{width:14px;height:14px;background:#E24B4A;clip-path:path("M7 13 C7 13 0 8 0 4 A4 4 0 0 1 7 2 A4 4 0 0 1 14 4 C14 8 7 13 7 13Z")}
.heart.empty{background:#B4B2A9}
</style>

<h2 class="sr-only">Endless runner game. Jump over obstacles using Space bar or by tapping the canvas.</h2>

<div id="wrap">
  <div id="hud">
    <div class="stat"><div class="slabel">Score</div><div class="sval" id="sc">0</div></div>
    <div class="stat"><div class="slabel">Best</div><div class="sval" id="best">0</div></div>
    <div class="stat"><div class="slabel">Lives</div><div id="lives"></div></div>
    <div class="stat"><div class="slabel">Level</div><div class="sval" id="lvl">1</div></div>
  </div>
  <canvas id="cv" width="640" height="220"></canvas>
  <div id="hint">Press <strong>Space</strong> or tap to jump &nbsp;|&nbsp; Double-jump allowed!</div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=640,H=220,GY=H-45;
const scEl=document.getElementById('sc'),bestEl=document.getElementById('best'),lvlEl=document.getElementById('lvl'),livesEl=document.getElementById('lives');

let gs,raf;

const PALETTE={sky:'#0f172a',ground:'#1e293b',groundLine:'#334155',star:'rgba(255,255,255,',
  runner:'#7F77DD',runnerDark:'#534AB7',runnerLight:'#AFA9EC',
  obs:'#D85A30',obsDark:'#4A1B0C',obsTop:'#F0997B',
  coin:'#EF9F27',coinDark:'#BA7517',
  cloud:'rgba(255,255,255,0.06)',
  flash:'rgba(231,76,60,0.18)'};

function mkStars(){return Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*(GY-10),r:Math.random()*1.2+.2,a:Math.random(),da:Math.random()*.02-.01,px:Math.random()*W}))}

function initGame(){
  clearInterval(raf);
  gs={
    state:'idle',
    score:0,best:gs?.best||0,
    lives:3,maxLives:3,
    level:1,
    frame:0,
    runner:{x:80,y:GY-44,w:26,h:44,vy:0,jumps:0,maxJumps:2,invincible:0,legF:0,legT:0},
    obs:[],coins:[],clouds:[],
    stars:mkStars(),
    bgX:0,groundX:0,
    nextObs:90,nextCoin:60,nextCloud:120,
    flashTimer:0,
    particles:[]
  };
  renderLives();
  scEl.textContent='0';
  lvlEl.textContent='1';
}

function renderLives(){
  livesEl.innerHTML='';
  for(let i=0;i<gs.maxLives;i++){
    const d=document.createElement('div');
    d.className='heart'+(i>=gs.lives?' empty':'');
    livesEl.appendChild(d);
  }
}

function jump(){
  if(gs.state==='idle'||gs.state==='over'){startGame();return;}
  if(gs.state!=='run')return;
  if(gs.runner.jumps<gs.runner.maxJumps){
    gs.runner.vy=-14.5;
    gs.runner.jumps++;
    spawnParticles(gs.runner.x+13,gs.runner.y+44,6,'#AFA9EC');
  }
}

function startGame(){
  initGame();
  gs.state='run';
  document.getElementById('hint').textContent='Space / tap = jump  |  Double-jump allowed!';
  loop();
}

function speed(){return 4.5+gs.level*.6+(gs.score/800)*.5;}

function update(){
  if(gs.state!=='run')return;
  gs.frame++;
  gs.score++;
  gs.level=1+Math.floor(gs.score/600);
  scEl.textContent=Math.floor(gs.score/5);
  lvlEl.textContent=gs.level;
  bestEl.textContent=Math.floor(gs.best/5);

  const sp=speed();
  gs.bgX=(gs.bgX-sp*.1+W)%W;
  gs.groundX=(gs.groundX-sp+W*4)%(W*4);

  gs.stars.forEach(s=>{s.a+=s.da;if(s.a<0||s.a>1)s.da*=-1;s.px=(s.px-sp*.05+W)%W;});

  const r=gs.runner;
  r.vy+=.7; r.y+=r.vy;
  if(r.y>=GY-r.h){r.y=GY-r.h;r.vy=0;r.jumps=0;}
  if(r.invincible>0)r.invincible--;
  r.legT++;
  if(r.legT>7){r.legF=(r.legF+1)%4;r.legT=0;}

  gs.clouds.forEach(c=>c.x-=sp*.2);
  gs.clouds=gs.clouds.filter(c=>c.x>-200);
  if(--gs.nextCloud<=0){
    gs.clouds.push({x:W+50,y:20+Math.random()*60,w:80+Math.random()*80,h:30+Math.random()*20});
    gs.nextCloud=180+Math.random()*120;
  }

  if(--gs.nextObs<=0){
    const tall=Math.random()<.3+gs.level*.05;
    gs.obs.push({x:W+10,w:20,h:tall?55:32,moving:gs.level>3&&Math.random()<.3,vy:.8+Math.random()*.5,my:GY-80});
    gs.nextObs=Math.max(50,100-gs.level*8)+Math.random()*60;
  }

  if(--gs.nextCoin<=0){
    const cx=W+20,cy=GY-70-Math.random()*60;
    gs.coins.push({x:cx,y:cy,r:8,collected:false,anim:0});
    gs.nextCoin=80+Math.random()*80;
  }

  gs.obs.forEach(o=>{
    o.x-=sp;
    if(o.moving){o.y+=o.vy;if(o.y<o.my||o.y>GY-o.h)o.vy*=-1;}
  });
  gs.obs=gs.obs.filter(o=>o.x>-50);

  gs.coins.forEach(c=>{c.x-=sp;c.anim+=.1;});
  gs.coins=gs.coins.filter(c=>c.x>-30&&!c.collected);

  gs.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;});
  gs.particles=gs.particles.filter(p=>p.life>0);

  if(gs.flashTimer>0)gs.flashTimer--;

  for(const c of gs.coins){
    if(!c.collected&&Math.abs(r.x+13-c.x)<20&&Math.abs(r.y+22-c.y)<20){
      c.collected=true;
      gs.score+=50;
      spawnParticles(c.x,c.y,8,'#EF9F27');
    }
  }

  if(r.invincible>0)return;
  for(const o of gs.obs){
    const oy=o.moving?o.y:GY-o.h;
    if(r.x+22>o.x+3&&r.x+4<o.x+o.w-3&&r.y+r.h-4>oy+4&&r.y+4<oy+o.h){
      gs.lives--;
      r.invincible=90;
      gs.flashTimer=20;
      renderLives();
      spawnParticles(r.x+13,r.y+22,12,'#E24B4A');
      if(gs.lives<=0){
        gs.state='over';
        if(gs.score>gs.best)gs.best=gs.score;
        document.getElementById('hint').textContent='Game over! Press Space or tap to restart';
      }
      break;
    }
  }
}

function spawnParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    gs.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:20+Math.random()*15,col});
  }
}

function drawBg(){
  ctx.fillStyle=PALETTE.sky;ctx.fillRect(0,0,W,H);
  gs.stars.forEach(s=>{
    ctx.fillStyle=PALETTE.star+s.a+')';
    ctx.beginPath();ctx.arc(s.px,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  gs.clouds.forEach(c=>{
    ctx.fillStyle=PALETTE.cloud;
    ctx.beginPath();ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2);ctx.fill();
  });
}

function drawGround(){
  ctx.fillStyle=PALETTE.ground;ctx.fillRect(0,GY,W,H-GY);
  ctx.strokeStyle=PALETTE.groundLine;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<4;i++){
    const x=((i*160)-gs.groundX%160+W*4)%W;
    ctx.beginPath();ctx.moveTo(x,GY);ctx.lineTo(x,H);ctx.stroke();
  }
}

function drawRunner(){
  const r=gs.runner;
  const blink=r.invincible>0&&Math.floor(r.invincible/6)%2===0;
  if(blink)return;
  const x=r.x,y=r.y;
  const f=r.legF;
  const legs=[[0,10],[8,0],[0,10],[-6,4]];
  const [l1,l2]=legs[f];
  ctx.fillStyle=PALETTE.runnerDark;
  ctx.fillRect(x+6,y+32,9,12+l1*.3);
  ctx.fillRect(x+14,y+32,9,12+l2*.3);
  ctx.fillStyle=PALETTE.runner;
  ctx.beginPath();ctx.ellipse(x+13,y+16,11,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=PALETTE.runnerLight;
  ctx.beginPath();ctx.arc(x+13,y+4,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x+10,y+2,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+16,y+2,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#26215C';
  ctx.beginPath();ctx.arc(x+10,y+2,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+16,y+2,1.5,0,Math.PI*2);ctx.fill();
}

function drawObs(){
  gs.obs.forEach(o=>{
    const oy=o.moving?o.y:GY-o.h;
    ctx.fillStyle=PALETTE.obsDark;ctx.fillRect(o.x,oy,o.w,o.h);
    ctx.fillStyle=PALETTE.obs;ctx.fillRect(o.x+2,oy+2,o.w-4,o.h-4);
    ctx.fillStyle=PALETTE.obsTop;ctx.fillRect(o.x+4,oy+4,o.w-8,6);
    if(o.moving){
      ctx.strokeStyle='rgba(240,153,123,0.4)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(o.x+o.w/2,oy);ctx.lineTo(o.x+o.w/2,GY-o.h);ctx.stroke();
      ctx.setLineDash([]);
    }
  });
}

function drawCoins(){
  gs.coins.forEach(c=>{
    const pulse=1+Math.sin(c.anim)*.1;
    ctx.save();ctx.translate(c.x,c.y);ctx.scale(pulse,pulse);
    ctx.fillStyle=PALETTE.coinDark;ctx.beginPath();ctx.arc(0,0,c.r+1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=PALETTE.coin;ctx.beginPath();ctx.arc(0,0,c.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(-2,-2,c.r*.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function drawParticles(){
  gs.particles.forEach(p=>{
    ctx.globalAlpha=p.life/35;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawFlash(){
  if(gs.flashTimer>0){
    ctx.fillStyle=PALETTE.flash;ctx.fillRect(0,0,W,H);
  }
}

function drawOverlay(){
  if(gs.state==='idle'){
    ctx.fillStyle='rgba(15,23,42,0.75)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='500 24px sans-serif';ctx.textAlign='center';
    ctx.fillText('Endless Runner',W/2,H/2-30);
    ctx.font='14px sans-serif';ctx.fillStyle='#AFA9EC';
    ctx.fillText('Collect coins   |   Avoid obstacles   |   3 lives',W/2,H/2+2);
    ctx.fillStyle='#7F77DD';ctx.fillText('Press Space or tap to start',W/2,H/2+30);
  } else if(gs.state==='over'){
    ctx.fillStyle='rgba(15,23,42,0.82)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#E24B4A';ctx.font='500 22px sans-serif';ctx.textAlign='center';
    ctx.fillText('Game Over',W/2,H/2-30);
    ctx.fillStyle='#fff';ctx.font='16px sans-serif';
    ctx.fillText('Score: '+Math.floor(gs.score/5)+'   |   Best: '+Math.floor(gs.best/5),W/2,H/2+2);
    ctx.fillStyle='#7F77DD';ctx.font='14px sans-serif';
    ctx.fillText('Press Space or tap to try again',W/2,H/2+30);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawGround();
  drawCoins();
  drawObs();
  drawRunner();
  drawParticles();
  drawFlash();
  drawOverlay();
}

function loop(){
  update();draw();
  if(gs.state!=='over'&&gs.state!=='idle')raf=requestAnimationFrame(loop);
  else if(gs.state==='over')draw();
}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
cv.addEventListener('pointerdown',e=>{e.preventDefault();jump();});

initGame();
draw();
</script>
